name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-26.04

    steps:
    - uses: actions/checkout@v4
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y llvm-18-dev libclang-18-dev unzip
    - name: Install cvc5
      # Ubuntu's libcvc5-dev package (1.3.2-1build1) is built without --poly,
      # so cvc5's --nl-cov option (which this project relies on — see
      # docs/design-decisions.md and src/solver/mod.rs) fails with
      # "Cannot use --nl-cov due to configuring without --poly". Install the
      # same official prebuilt release the Dockerfile uses instead (kept in
      # lockstep with it — see Dockerfile for the full rationale and version
      # pinning notes).
      run: |
        curl -fsSL -o /tmp/cvc5.zip \
          https://github.com/cvc5/cvc5/releases/download/cvc5-1.3.1/cvc5-Linux-x86_64-shared.zip
        unzip -q /tmp/cvc5.zip -d /tmp/cvc5-extracted
        sudo cp -r /tmp/cvc5-extracted/cvc5-Linux-x86_64-shared/include/. /usr/local/include/
        sudo cp -P /tmp/cvc5-extracted/cvc5-Linux-x86_64-shared/lib/*.so* /usr/local/lib/
        sudo ldconfig
        rm -rf /tmp/cvc5.zip /tmp/cvc5-extracted
        echo "CVC5_LIB_DIR=/usr/local/lib" >> "$GITHUB_ENV"

    - name: Check fmt
      run: cargo fmt --check
    - name: Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

    - name: Install llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: Coverage
      run: cargo llvm-cov --html
    - name: Setup Pages
      uses: actions/configure-pages@v5
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: target/llvm-cov/html
